<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tela de Cadastro</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<base target="_blank">
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="container">
    <div class="login-box">
      <div class="logo">
        <img src="img/login.png" alt="Logo" />
      </div>
      <h2>Crie aqui sua conta</h2>
      <p class="subtitle">Preencha os dados abaixo para começar</p>

      <form id="cadastroForm" novalidate>
        <div class="input-group">
          <label for="nome">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Nome completo
          </label>
          <input type="text" id="nome" placeholder="Digite seu nome completo" autocomplete="name" />
          <span class="error-msg" id="error-nome"></span>
        </div>

        <div class="input-group">
          <label for="email">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            E-mail
          </label>
          <input type="email" id="email" placeholder="exemple@email.com" autocomplete="email" />
          <span class="error-msg" id="error-email"></span>
        </div>

        <div class="input-group">
          <label for="usuarioCad">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Nome de usuário
          </label>
          <input type="text" id="usuarioCad" placeholder="Escolha um usuário" autocomplete="username" />
          <span class="error-msg" id="error-usuarioCad"></span>
        </div>

        <div class="input-group">
          <label for="senhaCad">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            Senha
          </label>
          <div class="password-wrap">
            <input type="password" id="senhaCad" placeholder="Crie uma senha forte" autocomplete="new-password" />
            <button type="button" class="toggle-password" id="toggleSenhaCad" aria-label="Mostrar senha">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <span class="error-msg" id="error-senhaCad"></span>
          <div class="strength-bar" id="strengthBar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <p class="strength-text" id="strengthText"></p>
        </div>

        <div class="input-group">
          <label for="confirmarSenha">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            Confirmar senha
          </label>
          <div class="password-wrap">
            <input type="password" id="confirmarSenha" placeholder="Repita a senha" autocomplete="new-password" />
            <button type="button" class="toggle-password" id="toggleConfirmar" aria-label="Mostrar senha">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <span class="error-msg" id="error-confirmarSenha"></span>
        </div>

        <div class="input-group terms-group">
          <label class="remember-me terms-label">
            <input type="checkbox" id="termos" />
            <span class="checkmark"></span>
            <span class="terms-text">Li e aceito os <a href="#" class="terms-link">Termos de Uso</a> e <a href="#" class="terms-link">Política de Privacidade</a></span>
          </label>
          <span class="error-msg" id="error-termos"></span>
        </div>

        <button type="submit" class="btn-primary" id="btnCadastrar">
          <span class="btn-text">Criar conta</span>
          <span class="btn-loader"></span>
        </button>
      </form>

      <div class="footer">
        <p>Já tem uma conta? <a href="index.html">Entrar</a></p>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
